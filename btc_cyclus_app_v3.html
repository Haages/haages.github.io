  if(!force){
    try{ const c=JSON.parse(sessionStorage.getItem("btc_binance")||"null");
      if(c&&c.rows&&c.rows.length>200&&(Date.now()-c.saved)<6*3600*1000){
        const m=merge(base,c.rows); return {...m, src:"ingebouwd 2010 + Binance (cache)", live:true, embEnd}; }
    }catch(e){}
  }
  try{
    const ohlc=await fetchBinance();
    try{ sessionStorage.setItem("btc_binance",JSON.stringify({rows:ohlc,saved:Date.now()})); }catch(e){}
    const m=merge(base,ohlc);
    return {...m, src:"ingebouwd 2010 + Binance (live)", live:true, embEnd};
  }catch(e){
    console.warn("Binance faalde, alleen ingebouwde historie:",e.message);
    return {line:base.map(r=>({time:r.time,close:r.close})), candles:[],
      src:"ingebouwde historie (geen live-verbinding)", live:false, embEnd};
  }
}

// ---- chart -----------------------------------------------------------------
let chart, wsS, lineS, candleS, pi1S, pi2S, lgLow, lgMid, lgHigh, markersPrim, lastData;
const vis={line:true, candle:false, scale:true, pi:true, lg:true, zones:true, halv:true};

function buildChart(){
  chart=LWC.createChart(document.getElementById('chart'),{
    autoSize:true,
    layout:{background:{type:LWC.ColorType.Solid,color:'#0b0e14'},textColor:'#8b93a3',fontFamily:'ui-monospace,monospace'},
    grid:{vertLines:{color:'#141a24'},horzLines:{color:'#141a24'}},
    rightPriceScale:{borderColor:'#1e2430',mode:1},
    timeScale:{borderColor:'#1e2430',rightOffset:6,fixLeftEdge:false,fixRightEdge:false},
    crosshair:{mode:LWC.CrosshairMode.Normal},
  });
  lgLow =chart.addSeries(LWC.LineSeries,{color:'#4aa3ff40',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  lgMid =chart.addSeries(LWC.LineSeries,{color:'#4aa3ff',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  lgHigh=chart.addSeries(LWC.LineSeries,{color:'#4aa3ff40',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  // Whitespace-serie: lege tijd-punten tot 2030, zodat de grafiek naar de toekomst kan (zones!)
  wsS=chart.addSeries(LWC.LineSeries,{color:'rgba(0,0,0,0)',lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
  candleS=chart.addSeries(LWC.CandlestickSeries,{upColor:'#26a669',downColor:'#ef5350',borderVisible:false,
    wickUpColor:'#26a669',wickDownColor:'#ef5350',visible:false});
  lineS =chart.addSeries(LWC.LineSeries,{color:'#e6e9ef',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
  pi1S  =chart.addSeries(LWC.LineSeries,{color:'#f7931a',lineWidth:2,priceLineVisible:false,lastValueVisible:false});
  pi2S  =chart.addSeries(LWC.LineSeries,{color:'#c586ff',lineWidth:2,priceLineVisible:false,lastValueVisible:false});
  markersPrim=LWC.createSeriesMarkers(lineS,[]); markersPrim._all=[];
  chart.timeScale().subscribeVisibleLogicalRangeChange(drawZones);
}

function render(data){
  lastData=data;
  const line=data.line, times=line.map(r=>r.time), closes=line.map(r=>r.close);
  lineS.setData(line.map(r=>({time:r.time,value:r.close})));
  candleS.setData(data.candles.map(c=>({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close})));

  // Log Growth (model) tot projectie-eind
  const lo=[],mi=[],hi=[];
  for(let t=times[0];t<=PROJ_END;t+=DAY*7){ const g=logGrowth(t);
    lo.push({time:t,value:g.low}); mi.push({time:t,value:g.mid}); hi.push({time:t,value:g.high}); }
  lgLow.setData(lo); lgMid.setData(mi); lgHigh.setData(hi);

  // Whitespace tot 2030: creëert de toekomstige tijd-as (nodig voor zones + vooruit scrollen)
  const ws=[]; const lastT=times[times.length-1];
  for(let t=lastT+DAY; t<=PROJ_END; t+=DAY*7) ws.push({time:t});
  wsS.setData(ws);

  // Pi Cycle op de volledige dagelijkse closes
  const s111=sma(closes,111), s350=sma(closes,350).map(v=>v==null?null:v*2);
  pi1S.setData(times.map((t,i)=>s111[i]==null?null:({time:t,value:s111[i]})).filter(Boolean));
  pi2S.setData(times.map((t,i)=>s350[i]==null?null:({time:t,value:s350[i]})).filter(Boolean));

  const marks=[];
  for(const t of piCrossings(times,s111,s350)) marks.push({time:t,position:'aboveBar',color:'#ef5350',shape:'arrowDown',text:'Pi top'});
  for(const h of HALVINGS) if(h.t>=times[0]) marks.push({time:h.t,position:'belowBar',color:'#8b93a3',shape:'circle',text:'⛏'});
  marks.sort((a,b)=>a.time-b.time); markersPrim._all=marks;

  applyVis();
  requestAnimationFrame(()=>{ setView('ALL'); setTimeout(drawZones,80); });
}

function drawZones(){
  const host=document.getElementById('zones'); host.innerHTML='';
  if(!vis.zones||!chart) return;
  const ts=chart.timeScale();
  for(const z of ZONES){
    const x1=ts.timeToCoordinate(z.from), x2=ts.timeToCoordinate(z.to);
    if(x1==null||x2==null) continue;
    const left=Math.min(x1,x2), w=Math.max(2,Math.abs(x2-x1));
    const d=document.createElement('div'); d.className='zone';
    d.style.left=left+'px'; d.style.width=w+'px';
    d.style.background=z.kind==='buy'?'var(--buy)':'var(--sell)';
    d.style.borderLeft='1px solid '+(z.kind==='buy'?'var(--buy-b)':'var(--sell-b)');
    d.style.borderRight=d.style.borderLeft;
    const l=document.createElement('div'); l.className='zl'; l.textContent=z.lbl;
    l.style.color=z.kind==='buy'?'#7ee0a8':'#ffa3a1'; d.appendChild(l); host.appendChild(d);
  }
}

function applyVis(){
  lineS.applyOptions({visible:vis.line});
  candleS.applyOptions({visible:vis.candle && lastData && lastData.candles.length>0});
  lgLow.applyOptions({visible:vis.lg}); lgMid.applyOptions({visible:vis.lg}); lgHigh.applyOptions({visible:vis.lg});
  pi1S.applyOptions({visible:vis.pi}); pi2S.applyOptions({visible:vis.pi});
  chart.priceScale('right').applyOptions({mode:vis.scale?1:0});
  if(markersPrim) markersPrim.setMarkers(vis.halv?(markersPrim._all||[]):[]);
  drawZones();
}

function setView(r){
  if(!lastData) return;
  const ts=chart.timeScale();
  const line=lastData.line, first=line[0].time, last=line[line.length-1].time;
  const spanDays={ "1M":30,"6M":182,"1J":365,"5J":365*5 };
  try{
    if(r==="ALL"){ ts.fitContent(); }                                   // toont 2010 → 2030 (whitespace)
    else if(r==="ZONES"){ ts.setVisibleRange({from:Date.UTC(2024,0,1)/1000, to:PROJ_END}); }
    else { const d=spanDays[r]||365; ts.setVisibleRange({from:last-d*DAY, to:last+20*DAY}); }
  }catch(e){ console.warn("setView faalde:",e.message); ts.fitContent(); }
}

function setStatus(d){
  const line=d.line, f=new Date(line[0].time*1000).toISOString().slice(0,10),
        l=new Date(line[line.length-1].time*1000).toISOString().slice(0,10);
  document.getElementById('status').innerHTML=`bron: <b>${d.src}</b><br>${line.length} dagen · ${f} → ${l}`;
  const badge=document.getElementById('badge');
  if(!d.live){ badge.style.display='block';
    badge.textContent='Geen live-verbinding — ingebouwde historie t/m mei 2026 (Binance actualiseert normaal het recente deel).'; }
  else badge.style.display='none';
}

function wireButtons(){
  document.getElementById('bar').addEventListener('click',async e=>{
    const b=e.target.closest('button.tgl'); if(!b) return; const k=b.dataset.k;
    if(k==='reload'){ b.textContent='…'; const d=await loadData(true); render(d); setStatus(d); b.textContent='↻'; return; }
    const on=b.getAttribute('aria-pressed')==='true'; b.setAttribute('aria-pressed',String(!on));
    if(k in vis){ vis[k]=!on; applyVis(); }
  });
  document.getElementById('nav').addEventListener('click',e=>{
    const b=e.target.closest('button.nb'); if(!b) return; setView(b.dataset.r); setTimeout(drawZones,40);
  });
}

async function start(force){
  document.getElementById('status').textContent='laden…';
  const d=await loadData(force); render(d); setStatus(d);
}

if(!LWC){ document.getElementById('status').textContent='Fout: grafiek-bibliotheek laadde niet (internet nodig voor de CDN).'; }
else{ buildChart(); wireButtons(); start(false); window.addEventListener('resize',()=>setTimeout(drawZones,60)); }
</script>
</body>
</html>
